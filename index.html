<!DOCTYPE html>
<html lang="pt-BR">
<br>
<br>
<img src="https://i.ibb.co/1f47SKQ2/f012aa4d-be87-4daf-a73c-111d50cc189a-1.png" width="300" height="auto" alt="Exemplo">
<br>
<br>
<head>

<meta charset="UTF-8">
<title>Yu-Gi-Oh ForbiddenDrop Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Verdana;
color:#FFD700;
text-align:center;
margin:0;

/* IMAGEM DE FUNDO */

background:url("https://i.ibb.co/7J4rdC9t/EWITy1-SWAAAJCKF.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}



.panel{
width:650px;
margin:auto;
background:rgba(10,10,10,0.95);
border:3px solid #FFD700;
border-radius:10px;
padding:25px;
box-shadow:0 0 25px gold;
}

h1{
color:#FFD700;
}

input{
width:150px;
padding:7px;
margin:6px;
text-align:center;
}

button{
padding:10px 20px;
margin:10px;
background:#FFD700;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#fff000;
}

.result{
margin-top:20px;
line-height:1.7;
color:white;
}

canvas{
margin-top:25px;
background:white;
border-radius:5px;
}

.slider{
width:300px;
}

footer{
position:fixed;
bottom:0;
width:100%;
background:rgba(0,0,0,0.9);
color:#FFD700;
padding:10px;
font-size:14px;
border-top:2px solid gold;
}

</style>

</head>

<body>

<div class="overlay">

<div class="panel">

<h1>Yu-Gi-Oh Drop Calculator</h1>

<h3>Configuração do Sistema</h3>

Possibilidades totais<br>
<input id="possibilidades" type="number" value="2048">

<br>

Total de cartas<br>
<input id="cartasTotal" type="number" value="722">

<br><br>

<h3>Cartas desejadas</h3>

<input id="cartasDesejadas" type="range" min="1" max="722" value="1"
class="slider" oninput="updateCarta(this.value)">

<br>

<span id="valorCarta">1</span> cartas

<br><br>

Quantidade de duelos<br>
<input id="duelos" type="number" value="100">

<br>

Simulações RNG<br>
<input id="simulacoes" type="number" value="10000">

<br><br>

<button onclick="calcular()">Calcular</button>
<button onclick="simular()">Simular RNG</button>

<div class="result" id="resultado"></div>

<canvas id="grafico"></canvas>

</div>

</div>

<footer>
Desenvolvido por: Fabio Maran
</footer>

<script>

let chart

function updateCarta(v){
document.getElementById("valorCarta").innerText=v
}

function calcular(){

let possibilidades=parseFloat(document.getElementById("possibilidades").value)
let cartas=parseFloat(document.getElementById("cartasDesejadas").value)
let duelos=parseFloat(document.getElementById("duelos").value)

let p=cartas/possibilidades

let chance=1-Math.pow((1-p),duelos)

function duelosNecessarios(prob){
return Math.ceil(Math.log(1-prob)/Math.log(1-p))
}

let d25=duelosNecessarios(0.25)
let d50=duelosNecessarios(0.50)
let d75=duelosNecessarios(0.75)
let d90=duelosNecessarios(0.90)

document.getElementById("resultado").innerHTML=`

Chance em 1 duelo: ${(p*100).toFixed(6)} %

<br><br>

Chance de dropar pelo menos 1 carta:

<h2>${(chance*100).toFixed(6)}%</h2>

<hr>

25% → ${d25} duelos<br>
50% → ${d50} duelos<br>
75% → ${d75} duelos<br>
90% → ${d90} duelos

`

gerarGrafico(p,duelos)

}

function gerarGrafico(p,duelos){

let labels=[]
let data=[]

for(let i=1;i<=duelos;i++){

let c=1-Math.pow((1-p),i)

labels.push(i)
data.push(c*100)

}

if(chart) chart.destroy()

let ctx=document.getElementById("grafico")

chart=new Chart(ctx,{

type:'line',

data:{
labels:labels,
datasets:[{
label:'Probabilidade (%)',
data:data,
borderColor:'gold',
fill:false
}]
}

})

}

function simular(){

let possibilidades=parseFloat(document.getElementById("possibilidades").value)
let cartas=parseFloat(document.getElementById("cartasDesejadas").value)
let duelos=parseFloat(document.getElementById("duelos").value)
let simulacoes=parseFloat(document.getElementById("simulacoes").value)

let p=cartas/possibilidades

let sucesso=0

for(let i=0;i<simulacoes;i++){

for(let j=0;j<duelos;j++){

if(Math.random()<p){

sucesso++
break

}

}

}

let chance=(sucesso/simulacoes)*100

document.getElementById("resultado").innerHTML+=`

<hr>

Simulação RNG:

<b>${chance.toFixed(4)}%</b> sucesso em ${simulacoes} testes

`

}

</script>

</body>
</html>
